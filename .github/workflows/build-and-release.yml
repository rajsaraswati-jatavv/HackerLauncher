name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      continue-on-error: true

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | head -1)
        VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's.* \([0-9]*\).*' | head -1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION_NAME ($VERSION_CODE)"

    - name: List APK files
      run: |
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ || true
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ || true

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-debug-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/debug/*.apk
      continue-on-error: true

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-release-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/release/*.apk
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: HackerLauncher v${{ steps.version.outputs.version_name }}
        body: |
          # HackerLauncher v${{ steps.version.outputs.version_name }}

          ## 🔧 CRITICAL CRASH FIXES (This Version)

          - **Firebase Auto-Init Crash** - Disabled Firebase auto-initialization (placeholder google-services.json was causing IllegalStateException before app even started)
          - **Notification Icon Crash** - Fixed RemoteServiceException (Android requires white notification icons, not colored)
          - **WorkManager Double-Init Crash** - Fixed IllegalStateException from WorkManager being initialized twice
          - **Missing FileProvider** - Added FileProvider declaration for file sharing
          - **BootReceiver directBootAware** - Removed to prevent SecurityException on boot
          - **AppLockService/OverlayService** - Added isServiceRunning() for watchdog compatibility
          - **Android 12+ Foreground Service** - Added ForegroundServiceStartNotAllowedException handling
          - **FirebaseAuthManager** - Added null safety for Firebase without real config
          - **NetworkMonitorService** - Fixed WifiManager null safety and receiver registration
          - **Compilation Errors** - Fixed type mismatches, missing imports, typos

          ## 🆕 NEW FEATURES (v7.0.0)

          ### Auto-Messaging System
          - **Hourly Hacker Tips** - WorkManager PeriodicWorkRequest runs every 1 hour showing hacker tips
          - **50+ Unique Tips** - Rotating collection of cybersecurity and hacking tips

          ### Auto-Upgrade Loop
          - **GitHub Release Check** - Automatically checks for new versions every 6 hours
          - **Auto-Download APK** - Downloads and prompts install of new releases

          ### Upgraded Cleanup Features
          - **RAM Boost** - Kill background processes with ActivityManager, animated progress
          - **Junk Cleaner** - Clean cache, temp, thumbnail files with visual progress
          - **Cache Cleaner** - Clean app-specific caches for all installed packages
          - **Storage Analyzer** - Storage usage breakdown with visual charts
          - **Battery Optimizer** - Battery stats, draining apps analysis, temperature/voltage

          ### 6 NEW Modules
          - **AdBlocker** - Block 77+ ad domains, hosts file modification
          - **BatterySaver** - 3 power modes, real-time monitoring, health report
          - **StorageManager** - Duplicate finder (MD5), large files, category breakdown
          - **AppBackup** - APK backup with search and batch backup support
          - **PrivacyGuard** - Privacy score (0-100), permission analysis, dangerous app detection
          - **NetworkScanner** - Subnet scanning, port scanner, ARP table, gateway info

          ## 🏠 Core Launcher Features (84 Total Fragments)

          ### Always-Running Background Services
          - **DaemonService** - Keeps app alive, restarts dead services
          - **WatchdogService** - Monitors all critical services, auto-restart
          - **KeepAliveService** - 6-layer keep-alive mechanism (JobScheduler, AlarmManager, etc.)
          - **HackerForegroundService** - Persistent foreground notification
          - **NetworkMonitorService** - WiFi/Cellular/VPN monitoring
          - **ProcessMonitorService** - Running process tracking
          - **SystemMonitorService** - CPU/RAM/Battery monitoring
          - **LocationTrackerService** - GPS location tracking
          - **AppLockService** - App locking with intruder photo
          - **OverlayService** - Screen overlay for notifications

          ### Launcher Features
          - **Home Screen** - Custom hacker-themed launcher home
          - **App Drawer** - Grid/list view of all apps
          - **App Search** - Quick search for apps
          - **App Folders** - Create custom app folders
          - **Quick Settings** - Toggle WiFi, Bluetooth, etc.
          - **Dock Bar** - Quick access to favorite apps
          - **Gesture Manager** - Custom gestures for actions
          - **Theme Manager** - Dark hacker themes
          - **Notification Listener** - Read all notifications
          - **Recent Apps** - Recent app history
          - **Calculator** - Built-in calculator
          - **Todo List** - Task management
          - **Notes** - Quick notes
          - **Device Info** - Complete device information

          ### Hacker Tool Modules
          - **Terminal Emulator** - Termux bridge
          - **Network Scanner** - Local network scanning
          - **Port Scanner** - Open port detection
          - **WiFi Analyzer** - WiFi signal analysis
          - **IP Tools** - IP geolocation, whois
          - **DNS Changer** - Custom DNS settings
          - **VPN Monitor** - VPN detection
          - **Packet Capture** - Network packet inspection
          - **SSL Checker** - Certificate verification
          - **HTTP Inspector** - Header analysis
          - **MAC Changer** - MAC address modification
          - **Connection Logger** - Network log
          - **SIP Scanner** - SIP detection
          - **Network Booster** - Connection optimization
          - **System Cleaner** - RAM/Junk/Cache/Battery cleanup
          - **AdBlocker** - Ad blocking
          - **BatterySaver** - Power management
          - **StorageManager** - Storage analysis
          - **AppBackup** - APK backup/restore
          - **PrivacyGuard** - Privacy scoring
          - **Whois Lookup** - Domain information
          - **IP Geolocation** - IP location finder
          - **Reverse Image Search** - Image lookup
          - **Metadata Extractor** - File metadata viewer
          - **Sensor Box** - Device sensor data
          - **Screen Dimmer** - Night mode / dimming
          - **Notification History** - Past notifications
          - **Call Recorder** - Record calls
          - **App Cloner** - Clone apps
          - **Secure Vault** - AES encrypted storage
          - **Anti-Theft** - Remote lock/alarm/locate/wipe
          - **Panic Button** - Emergency actions
          - **Fake Location** - Mock GPS location
          - **Deep Link Scanner** - URL scheme scanner
          - **Honeypot Detector** - Network trap detection
          - **Device Admin** - Admin management
          - **Screen Pinning** - Pin apps
          - **Permission Analyzer** - App permissions audit

          ### Live Wallpaper
          - **Matrix Rain** - Classic falling green characters
          - **Glitch Effect** - Digital glitch animation
          - **CRT Scanlines** - Retro CRT monitor effect
          - **Particle Network** - Connected particles animation

          ### Authentication
          - **Firebase Auth** - Google + GitHub OAuth (graceful fallback)
          - **Biometric Lock** - Fingerprint/Face unlock
          - **PIN Lock** - Custom PIN for app lock

          ### Permissions: 70+ Android permissions for full system access

        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
