name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      continue-on-error: true

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | head -1)
        VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's.* \([0-9]*\).*' | head -1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION_NAME ($VERSION_CODE)"

    - name: List APK files
      run: |
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ || true
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ || true

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-debug-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/debug/*.apk
      continue-on-error: true

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-release-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/release/*.apk
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: HackerLauncher v${{ steps.version.outputs.version_name }}
        body: |
          # HackerLauncher v${{ steps.version.outputs.version_name }} - ULTIMATE EDITION

          ## v12.0.0 ULTIMATE - 100+ Features

          ### Critical Crash Fixes
          - **BootReceiver** - Fixed wrong action strings causing ForegroundServiceDidNotStartInTimeException
          - **AppLockService** - Fixed intruder photo never triggering (missing action handler)
          - **Service Restart Storm** - Added 30-second rate-limiting between restart attempts
          - **ProcessMonitorService ANR** - Fixed heavy notification updates blocking main thread
          - **HackerForegroundService** - Added to Watchdog monitoring list
          - **Coroutine Scope Leak** - Added scope.cancel() in onDestroy() for all 7 services
          - **DaemonService WakeLock** - Added periodic re-acquisition before 12-hour expiry

          ### 31 NEW Features Added
          **Network Tools:** VPN Monitor, Port Scanner, DNS Changer, IP Geolocation, Whois Lookup, SSL Certificate Checker, HTTP Header Inspector, MAC Address Changer, Packet Capture, Connection Logger, WiFi Password Viewer, SIP Scanner, Network Booster
          
          **Security Tools:** Anti-Theft (remote lock/alarm/locate/wipe), Intruder Selfie (enhanced), Permission Analyzer, Deep Link Scanner, Honeypot Detector, Secure Vault (AES encrypted), Panic Button, Fake Location, Screen Pinning, Device Admin Manager
          
          **Utility Tools:** APK Extractor/Backup, Sensor Box, Screen Dimmer/Night Mode, Notification History, Call Recorder, App Cloner, Reverse Image Search, Metadata Extractor

          ### Upgraded Existing Features
          - **RAM Cleaner** - Super Boost, deep hibernation, smart rules, auto-schedule, memory pressure indicator
          - **Battery Optimizer** - Charging protection, health monitor, power saving profiles, temperature alerts
          - **System Cleaner** - Advanced junk detection, 12 scan categories, scheduled auto-clean, whitelist
          - **Storage Analyzer** - Visual charts, folder ranking, duplicate detection, trend tracking, export
          - **App Cache Cleaner** - Smart cache rules, scheduled cleaning, growth tracking
          - **Auto-Message** - Custom templates, SMS sending, notification categories, message history
          - **Auto-Upgrade** - Auto-download APK, changelog viewer, rollback support, beta channel

          ### Core Features (78 Total Fragments)
          - **7 Always-Running Services** - Daemon, Watchdog, KeepAlive (6 layers), Network Monitor, Process Monitor, System Monitor
          - **70+ Permissions** - Full system access
          - **Live Wallpaper** - Matrix rain, glitch effect, particle network
          - **Firebase Auth** - Google + GitHub login (safe fallback)
          - **App Lock** - Biometric/PIN lock for apps with intruder photo
          - **Hourly Auto-Message** - WorkManager cron job every 1 hour
          - **Auto-Upgrade Loop** - Checks GitHub releases every 6 hours

        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
