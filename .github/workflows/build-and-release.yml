name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | head -1)
        VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's/.* \([0-9]*\).*/\1/' | head -1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION_NAME ($VERSION_CODE)"

    - name: List APK files
      run: |
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ || true
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ || true

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-debug-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-release-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: HackerLauncher v${{ steps.version.outputs.version_name }}
        body: |
          # HackerLauncher v${{ steps.version.outputs.version_name }}

          ## Next Level Features
          - **Upgraded RAM Cleaner** - Real-time graph, hibernation, smart clean, memory leak detector, defrag visualization
          - **Duplicate File Cleaner** - MD5 hash-based duplicate detection with category filters
          - **Storage Analyzer** - Visual pie chart, largest files, category breakdown
          - **App Cache Cleaner** - One-click cache cleaning for all apps
          - **Big File Finder** - Find files larger than configurable threshold
          - **CPU Monitor** - Real-time CPU usage graph, temperature, frequency, process killer
          - **Network Speed Monitor** - Live speed graph, latency test, speed test
          - **App Manager** - Batch uninstall, export, search, sort & filter
          - **Data Usage Tracker** - Mobile/WiFi usage, per-app breakdown, usage alerts
          - **47 Total Modules** - The most powerful Android launcher
          - **7 Always-Running Services** - Daemon, Watchdog, KeepAlive (6 layers), Network Monitor, Process Monitor, System Monitor, Location Tracker
          - **60+ Permissions** - Full system access
          - **Live Wallpaper** - Matrix rain, glitch effect, particle network
          - **Firebase Auth** - Google + GitHub login
          - **App Lock** - Biometric/PIN lock for apps

        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
