name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      continue-on-error: true

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | head -1)
        VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's.* \([0-9]*\).*' | head -1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION_NAME ($VERSION_CODE)"

    - name: List APK files
      run: |
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ || true
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ || true

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-debug-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/debug/*.apk
      continue-on-error: true

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-release-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/release/*.apk
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: HackerLauncher v${{ steps.version.outputs.version_name }}
        body: |
          # HackerLauncher v${{ steps.version.outputs.version_name }} - ULTRA EDITION

          ## Critical Crash Fixes (v11.0.0)
          - **GeofenceBroadcastReceiver** - Fixed ClassNotFoundException (wrong class name format in manifest)
          - **NotificationListener registerReceiver** - Added RECEIVER_NOT_EXPORTED flag for Android 14+ (was causing SecurityException crash)
          - **OverlayService foregroundServiceType** - Added required foregroundServiceType for Android 14+ (was causing ForegroundServiceTypeMissingException)
          - **WorkManager Double-Init** - Disabled default initializer in manifest, proper manual initialization (was causing IllegalStateException)
          - **Duplicate Notification ID** - Changed AppLockService NOTIFICATION_ID from 1001 to 1009 (was conflicting with DaemonService)
          - **KeepAliveService System Broadcasts** - Fixed RECEIVER_EXPORTED for system broadcasts (ACTION_SCREEN_ON etc.)
          - **BatteryOptimizerFragment** - Fixed registerReceiver for system broadcasts on Android 14+
          - **SystemMonitorService** - Fixed screen receiver registration on Android 14+
          - **NetworkMonitorService** - Fixed connectivity receiver registration on Android 14+

          ## New Features
          - **Hourly Auto-Message Cron Job** - WorkManager PeriodicWorkRequest runs every 1 hour, sends system status notifications
          - **Auto-Upgrade Loop** - Checks GitHub releases API every 6 hours, notifies when new version available with download link
          - **6-Layer Keep-Alive** - Foreground + AlarmManager + JobScheduler + WorkManager + BroadcastReceiver + ContentObserver
          - **WorkManager Custom Config** - Proper initialization via Configuration.Provider

          ## All 47+ Features
          - **7 Always-Running Services** - Daemon, Watchdog, KeepAlive (6 layers), Network Monitor, Process Monitor, System Monitor
          - **60+ Permissions** - Full system access
          - **Live Wallpaper** - Matrix rain, glitch effect, particle network
          - **Firebase Auth** - Google + GitHub login (safe fallback)
          - **App Lock** - Biometric/PIN lock for apps with intruder photo
          - **RAM Cleaner** - Real-time graph, hibernation, smart clean, deep clean, kill all
          - **Storage Cleaner** - Duplicates, cache, big files, analyzer, system cleaner
          - **Battery Optimizer** - Charging alarm, health monitor, process killer
          - **System Monitor** - Battery, CPU, RAM, storage, network speed
          - **Terminal** - Built-in terminal emulator
          - **Network Tools** - WiFi arsenal, subnet scanner, speed test
          - **Security Tools** - Password tools, crypto, OSINT, anonymity

        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
