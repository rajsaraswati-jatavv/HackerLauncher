name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      continue-on-error: true

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | head -1)
        VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's.* \([0-9]*\).*' | head -1)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION_NAME ($VERSION_CODE)"

    - name: List APK files
      run: |
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ || true
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ || true

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-debug-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/debug/*.apk
      continue-on-error: true

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackerLauncher-release-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/release/*.apk
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: HackerLauncher v${{ steps.version.outputs.version_name }}
        body: |
          # HackerLauncher v${{ steps.version.outputs.version_name }} - CRASH FIX

          ## Critical Fixes
          - **Firebase Crash Fix** - All Firebase calls wrapped in try-catch, safe with placeholder config
          - **Service Start Crash Fix** - Staggered service starts (2s delay between each) prevents `ForegroundServiceDidNotStartInTimeException`
          - **BootReceiver Fix** - Safe staggered service start on device boot
          - **AppLock Activity Fix** - Correct class references in AndroidManifest
          - **ProGuard Disabled** - Prevents missing class/resource crashes in release builds

          ## New Features
          - **Hourly Auto-Message Cron Job** - WorkManager PeriodicWorkRequest runs every 1 hour, sends system status notifications
          - **Auto-Upgrade Loop** - Checks GitHub releases API every 6 hours, notifies when new version available
          - **WorkManager Custom Config** - Proper initialization via Configuration.Provider

          ## All Features
          - **47 Total Modules** - The most powerful Android launcher
          - **7 Always-Running Services** - Daemon, Watchdog, KeepAlive (6 layers), Network Monitor, Process Monitor, System Monitor
          - **60+ Permissions** - Full system access
          - **Live Wallpaper** - Matrix rain, glitch effect, particle network
          - **Firebase Auth** - Google + GitHub login (safe fallback)
          - **App Lock** - Biometric/PIN lock for apps
          - **RAM Cleaner** - Real-time graph, hibernation, smart clean
          - **Storage Cleaner** - Duplicates, cache, big files, analyzer
          - **System Monitor** - Battery, CPU, RAM, storage, network speed

        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
